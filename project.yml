name: SEAPIApp
options:
  bundleIdPrefix: com.mtbsteve.semonitor
  deploymentTarget:
    watchOS: "10.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  # ---------- watchOS app (standalone) ----------
  SEAPIApp Watch App:
    type: application
    platform: watchOS
    sources:
      - path: "SEAPIApp Watch App"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mtbsteve.semonitor.watchkitapp
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_CFBundleDisplayName: "SE Monitor"
        INFOPLIST_KEY_WKApplication: YES
        INFOPLIST_KEY_WKWatchOnly: YES
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        TARGETED_DEVICE_FAMILY: "4"
        # CRITICAL for standalone watchOS apps: XcodeGen defaults
        # SKIP_INSTALL = YES on watchOS apps because it assumes they're
        # embedded in a host iPhone app. For standalone (WKWatchOnly: YES)
        # apps we MUST override to NO — otherwise archives are empty.
        SKIP_INSTALL: NO
        CODE_SIGN_ENTITLEMENTS: "SEAPIApp Watch App/SEAPIApp.entitlements"
    dependencies:
      - target: SEAPIComplication
        embed: true

  # ---------- watchOS complication ----------
  SEAPIComplication:
    type: app-extension
    platform: watchOS
    sources:
      - path: SEAPIComplication
    info:
      path: SEAPIComplication/Info.plist
      properties:
        CFBundleDisplayName: "SE Complication"
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: NO
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mtbsteve.semonitor.complication
        TARGETED_DEVICE_FAMILY: "4"
        CODE_SIGN_ENTITLEMENTS: SEAPIComplication/SEAPIComplication.entitlements
