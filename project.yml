name: SEAPIApp
options:
  bundleIdPrefix: com.mtbsteve.semonitor
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  # ---------- iOS watchapp2 container (invisible delivery wrapper) ----------
  # This is Apple's purpose-built target type for shipping a watch app through
  # the iOS App Store without an iPhone-visible app. It has no source code,
  # no Home Screen icon presence, no UI. Customers download from the iOS App
  # Store and the watch app appears on their Apple Watch; nothing visible on
  # iPhone. Required for App Store distribution in Xcode 26.5.
  SEAPIApp:
    type: application.watchapp2-container
    platform: iOS
    sources:
      - path: SEAPIAppContainer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mtbsteve.semonitor
        PRODUCT_NAME: "SE Monitor"
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_CFBundleDisplayName: "SE Monitor"
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        VALIDATE_PRODUCT: YES
        # No entitlements — the watchapp2-container is invisible to users
        # and doesn't access any sandboxed resources. App Group is only on
        # the watch app + complication for their shared snapshot cache.
    dependencies:
      - target: SEAPIApp Watch App
        embed: true

  # ---------- watchOS app (paired with the container above) ----------
  SEAPIApp Watch App:
    type: application
    platform: watchOS
    sources:
      - path: "SEAPIApp Watch App"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mtbsteve.semonitor.watchkitapp
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_CFBundleDisplayName: "SE Monitor"
        INFOPLIST_KEY_WKApplication: YES
        # Yes, WKWatchOnly stays YES even with the watchapp2-container above.
        # The container has LSApplicationLaunchProhibited + ITSWatchOnlyContainer,
        # which means the iOS side never actually launches. The watch app is
        # the only thing users see. ASC validation requires WKWatchOnly=YES
        # in this configuration (rejection code 90752 if NO).
        INFOPLIST_KEY_WKWatchOnly: YES
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        TARGETED_DEVICE_FAMILY: "4"
        CODE_SIGN_ENTITLEMENTS: "SEAPIApp Watch App/SEAPIApp.entitlements"
    dependencies:
      - target: SEAPIComplication
        embed: true

  # ---------- watchOS complication ----------
  SEAPIComplication:
    type: app-extension
    platform: watchOS
    sources:
      - path: SEAPIComplication
      # Share API client + models with the complication so its TimelineProvider
      # can fetch its own data when the watch app isn't running.
      - path: "SEAPIApp Watch App/Models.swift"
      - path: "SEAPIApp Watch App/SolarEdgeAPI.swift"
    info:
      path: SEAPIComplication/Info.plist
      properties:
        CFBundleDisplayName: "SE Complication"
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: NO
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mtbsteve.semonitor.watchkitapp.comp
        TARGETED_DEVICE_FAMILY: "4"
        CODE_SIGN_ENTITLEMENTS: SEAPIComplication/SEAPIComplication.entitlements
